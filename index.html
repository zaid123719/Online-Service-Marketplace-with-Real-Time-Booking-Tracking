<!DOCTYPE html>
<html>
<head>
<title>ServiceHub Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>ServiceHub ⚡</h2>
</div>

    <p>Electrician • Plumber • AC Repair</p>

<div class="services">

    <h3>Plumber</h3>
</div>

    <img src="ac.jpg">
    <h3>AC Repair</h3>
</div>

</body>
</html>
